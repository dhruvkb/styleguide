#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
	{ id = "trailing-whitespace", args = [
		"--markdown-linebreak-ext=md,mdx",
	] },
	{ id = "end-of-file-fixer" },
	{ id = "check-json", exclude = "^\\.vscode/.*\\.json|.oxlintrc\\.json|.oxfmtrc\\.json|tsconfig\\.json$" },
	{ id = "check-toml" },
	{ id = "check-yaml" },
	{ id = "mixed-line-ending", args = [
		"--fix=lf",
	] },
	{ id = "check-symlinks" },
	{ id = "destroyed-symlinks" },
	{ id = "check-merge-conflict" },
	{ id = "detect-private-key" },
	{ id = "check-shebang-scripts-are-executable" },
	{ id = "check-executables-have-shebangs" },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.7.0"
hooks = [{ id = "editorconfig-checker", exclude = "^LICENSE$" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.0"
hooks = [{ id = "ruff-check", args = ["--fix"] }, { id = "ruff-format" }]

[[repos]]
repo = "local"
hooks = [
	{ id = "oxfmt", name = "Oxfmt", entry = "pnpm oxfmt", language = "system", types_or = [
		# Taken from the Oxc compatibility list: https://oxc.rs/compatibility.html
		"javascript",
		"ts",
		"vue",
		"css",
		"html",
		"json",
		"yaml",
		"markdown",
		"mdx",
		"toml",
	], args = [
		# Since there may be files which match `types_or` but are ignored by
		# `.oxfmtrc.json`, we need to silence the error raised when the staged
		# change only has the ignored files.
		"--no-error-on-unmatched-pattern",
	] },
]

# § project
# § =======

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "v0.0.56"
hooks = [{ id = "ty" }]

[[repos]]
repo = "local"
hooks = [
	# This is also exported for other repos to source from `.pre-commit-hooks.yaml`. Keep
	# all fields, especially the regex in `entry`, synced between the two.
	{ id = "no-inline-tabs", name = "check for inline tabs", entry = '^\t*[^\t].*\t', language = "pygrep", types = [
		"text",
	] },
	{ id = "no-autosquash-commits", name = "check for autosquash commits", entry = "hooks/no-autosquash-commits.py", language = "script", stages = [
		"pre-push",
	], always_run = true, pass_filenames = false },
]

# /§ project
